server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # CRITICAL: This enables React Router SPA navigation.
        # Fallbacks to index.html if the path does not match a server file exactly.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache control for static assets (images, css, js)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
